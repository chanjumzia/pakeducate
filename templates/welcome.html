<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خوش آمدید - پاک ایجوکیٹ</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --text-light: #ffffff;
            --font-urdu: 'Noto Nastaliq Urdu', serif;
            --font-eng: 'Poppins', sans-serif;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            font-family: var(--font-eng);
            margin: 0;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-light);
            text-align: center;
        }

        .welcome-card {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 500px;
            animation: fadeIn 1s ease-in-out, slideInUp 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInUp {
            from { transform: translateY(30px); }
            to { transform: translateY(0); }
        }

        h1 {
            font-family: var(--font-urdu);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-family: var(--font-urdu);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .clock-container {
            font-family: var(--font-eng);
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .date-container {
            font-family: var(--font-eng);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .btn {
            background-color: var(--text-light);
            color: var(--secondary-color);
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-family: var(--font-urdu);
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #f1c40f;
            color: #2c3e50;
            transform: translateY(-3px);
        }

    </style>
</head>
<body>
    <div class="welcome-card">
        <h1>خوش آمدید، {{ username }}!</h1>
        <p>آپ پاک ایجوکیشن سسٹم میں کامیابی سے لاگ ان ہو گئے ہیں۔</p>
        <div id="clock" class="clock-container"></div>
        <div id="date" class="date-container"></div>
        <a href="{{ url_for('index') }}" class="btn">ڈیش بورڈ پر جائیں</a>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        setInterval(updateTime, 1000);
        updateTime(); // Initial call
    </script>
</body>
</html>
