<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رجسٹریشن - پاک ایجوکیٹ</title>
    <style>
        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            direction: rtl;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .message {
            text-align: center;
            margin-top: 15px;
        }
        .login-link {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>نیا اکاؤنٹ بنائیں</h1>
        <form method="POST">
            <div class="input-group">
                <label for="username">صارف کا نام</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">پاس ورڈ</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="input-group">
                <label for="role">کردار (Role)</label>
                <select id="role" name="role" required>
                    <option value="Admin">ایڈمن / پرنسپل</option>
                    <option value="Accountant">اکاؤنٹنٹ</option>
                    <option value="Teacher">ٹیچر</option>
                </select>
            </div>
            <button type="submit">رجسٹر کریں</button>
            {% if message %}
                <p class="message">{{ message }}</p>
            {% endif %}
        </form>
        <p class="message">
            پہلے سے اکاؤنٹ ہے؟ <a href="/login" class="login-link">یہاں لاگ ان کریں</a>
        </p>
    </div>
</body>
</html>
