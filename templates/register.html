<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نیا صارف بنائیں - پاک ایجوکیٹ</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #d35400;
            --primary-hover: #e67e22;
            --secondary-color: #2c3e50;
            --text-light: #ffffff;
            --background-light: #fdfefe;
            --font-urdu: 'Noto Nastaliq Urdu', serif;
            --font-eng: 'Poppins', sans-serif;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            font-family: var(--font-eng);
            margin: 0;
            background-color: var(--background-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .register-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            background-color: var(--text-light);
            box-shadow: var(--shadow);
            border-radius: 15px;
            overflow: hidden;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .form-panel {
            flex: 2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .branding-panel {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 50px;
        }
        .branding-panel h1 {
            font-family: var(--font-urdu);
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .branding-panel p {
            font-size: 1.2rem;
            font-family: var(--font-urdu);
        }

        .form-panel h2 {
            font-family: var(--font-urdu);
            font-size: 2.5rem;
            color: var(--secondary-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        
        label {
            font-family: var(--font-urdu);
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: var(--font-eng);
            direction: ltr;
            text-align: right;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        /* Specific styling for Urdu-heavy inputs */
        input[name="full_name"], input[name="father_name"], textarea {
            font-family: var(--font-urdu);
        }

        .full-width { grid-column: 1 / -1; }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.2rem;
            font-family: var(--font-urdu);
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover { background-color: var(--primary-hover); }

        .message, .back-link {
            text-align: center;
            margin-top: 15px;
            font-family: var(--font-urdu);
        }
        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .back-link a:hover { text-decoration: underline; }

        .message.error {
            color: #c0392b;
        }

    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="form-panel">
            <h2>اکاؤنٹ بنائیں</h2>
            <form method="POST">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="username">یوزر نیم (انگریزی)</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="input-group">
                        <label for="password">پاس ورڈ</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="input-group">
                        <label for="full_name">پورا نام</label>
                        <input type="text" id="full_name" name="full_name" required>
                    </div>
                    <div class="input-group">
                        <label for="father_name">والد کا نام</label>
                        <input type="text" id="father_name" name="father_name" required>
                    </div>
                    <div class="input-group">
                        <label for="cnic">شناختی کارڈ (xxxxx-xxxxxxx-x)</label>
                        <input type="text" id="cnic" name="cnic" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">فون (03xx-xxxxxxx)</label>
                        <input type="text" id="phone" name="phone" required>
                    </div>
                    <div class="input-group">
                        <label for="email">ای میل</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="input-group">
                        <label for="marital_status">ازدواجی حیثیت</label>
                        <select id="marital_status" name="marital_status" required>
                            <option value="Single">غیر شادی شدہ</option>
                            <option value="Married">شادی شدہ</option>
                        </select>
                    </div>
                    <div class="input-group full-width">
                        <label for="role">صارف کا کردار</label>
                        <select id="role" name="role" required>
                            <option value="Admin">ایڈمن</option>
                            <option value="Principal">پرنسپل</option>
                            <option value="Accountant">اکاؤنٹنٹ</option>
                            <option value="Teacher">ٹیچر</option>
                        </select>
                    </div>
                    <div class="input-group full-width">
                        <label for="address">مکمل پتہ</label>
                        <textarea id="address" name="address" rows="2" required></textarea>
                    </div>
                </div>
                <button type="submit" class="full-width">رجسٹر کریں</button>

                {% if message %}
                    <p class="message error">{{ message }}</p>
                {% endif %}
            </form>
             <p class="back-link">
                 پہلے سے ایک اکاؤنٹ ہے؟ <a href="/login">یہاں لاگ ان ہوں</a>
            </p>
        </div>
        <div class="branding-panel">
            <h1>ہمارے ساتھ شامل ہوں</h1>
            <p>ایک روشن مستقبل کی طرف اپنا سفر شروع کریں۔</p>
        </div>
    </div>
</body>
</html>
