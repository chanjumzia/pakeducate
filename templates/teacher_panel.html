<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ٹیچر ڈیش بورڈ - پاک ایجوکیٹ</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>Pak<span>Educate</span></h2></div>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-tachometer-alt"></i>ڈیش بورڈ</a>
            <a href="#search-student"><i class="fas fa-search"></i>طالب علم تلاش کریں</a>
            <a href="#add-student"><i class="fas fa-user-plus"></i>طالب علم شامل کریں</a>
            <a href="#student-list-section"><i class="fas fa-users"></i>طلباء کی فہرست</a>
            <a href="#upload-task"><i class="fas fa-tasks"></i>ٹاسک اپلوڈ کریں</a>
        </nav>
        <div class="logout-btn"><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i>لاگ آؤٹ</a></div>
    </div>

    <div class="main-content">
        <header class="header"><h1>ٹیچر ڈیش بورڈ</h1></header>

        <div class="welcome-section"><h2>خوش آمدید، {{ username }}!</h2></div>

        <div id="search-student" class="tool-section">
            <h3><i class="fas fa-search"></i> طالب علم تلاش کریں</h3>
            <div class="form-group">
                <label for="studentId">طالب علم ID</label>
                <input type="text" id="studentId" placeholder="ID درج کریں">
            </div>
            <button class="btn" onclick="searchStudent()">تلاش کریں</button>
            <div id="studentData" style="display: none;"></div>
        </div>

        <div id="add-student" class="tool-section">
            <h3><i class="fas fa-user-plus"></i> نیا طالب علم شامل کریں</h3>
            <form onsubmit="addStudent(event)">
                <div class="form-group">
                    <label for="newName">پورا نام</label>
                    <input type="text" id="newName" required>
                </div>
                <div class="form-group">
                    <label for="newFatherName">والد کا نام</label>
                    <input type="text" id="newFatherName" required>
                </div>
                 <div class="form-group">
                    <label for="newClass">کلاس</label>
                    <input type="text" id="newClass" required>
                </div>
                <button type="submit" class="btn">طالب علم شامل کریں</button>
            </form>
        </div>
        
        <div id="student-list-section" class="tool-section">
            <h3><i class="fas fa-users"></i> کل طلباء کی فہرست</h3>
            <div id="student-list">
                <!-- Students will be dynamically added here -->
            </div>
        </div>

        <div id="upload-task" class="tool-section">
            <h3><i class="fas fa-tasks"></i> نیا ٹاسک اپ لوڈ کریں</h3>
            <form onsubmit="uploadTask(event)">
                <div class="form-group">
                    <label for="taskTitle">ٹاسک کا عنوان</label>
                    <input type="text" id="taskTitle" required>
                </div>
                 <div class="form-group">
                    <label for="taskDescription">تفصیل</label>
                    <textarea id="taskDescription" rows="4"></textarea>
                </div>
                <button type="submit" class="btn">اپ لوڈ کریں</button>
            </form>
        </div>
    </div>

    <script>
        // Mock data for students
        let students = [
            { id: '101', name: 'محمد علی', fatherName: 'احمد علی', className: 'دہم' },
            { id: '102', name: 'فاطمہ خان', fatherName: 'عمران خان', className: 'نہم' },
            { id: '103', name: 'بلال احمد', fatherName: 'طارق احمد', className: 'دہم' }
        ];

        function searchStudent() {
            const studentId = document.getElementById('studentId').value;
            const studentDataDiv = document.getElementById('studentData');

            if (!studentId) {
                showToast('براہ کرم طالب علم ID درج کریں۔', 'error');
                return;
            }
            
            const student = students.find(s => s.id === studentId);
            
            if (student) {
                studentDataDiv.innerHTML = `
                    <div class="student-data">
                        <p><strong>ID:</strong> ${student.id}</p>
                        <p><strong>نام:</strong> ${student.name}</p>
                        <p><strong>والد کا نام:</strong> ${student.fatherName}</p>
                        <p><strong>کلاس:</strong> ${student.className}</p>
                    </div>`;
                studentDataDiv.style.display = 'block';
            } else {
                studentDataDiv.innerHTML = '<div class="student-data"><p>اس ID کے ساتھ کوئی طالب علم نہیں ملا۔</p></div>';
                studentDataDiv.style.display = 'block';
                showToast('طالب علم نہیں ملا!', 'error');
            }
        }

        function addStudent(event) {
            event.preventDefault();
            const newName = document.getElementById('newName').value;
            const newFatherName = document.getElementById('newFatherName').value;
            const newClass = document.getElementById('newClass').value;
            
            const newId = 'ST' + (students.length + 101);
            
            students.push({ id: newId, name: newName, fatherName: newFatherName, className: newClass });
            
            showToast('نیا طالب علم کامیابی سے شامل کر دیا گیا ہے۔', 'success');
            renderStudentList();
            event.target.reset();
        }
        
        function renderStudentList() {
            const studentListDiv = document.getElementById('student-list');
            studentListDiv.innerHTML = ''; // Clear existing list
            
            students.forEach(student => {
                const studentItem = document.createElement('div');
                studentItem.className = 'student-list-item';
                studentItem.innerHTML = `
                    <div>
                        <strong>${student.name}</strong> (ID: ${student.id}) - کلاس: ${student.className}
                    </div>
                    <button class="btn-small" onclick="viewStudent('${student.id}')">تفصیلات دیکھیں</button>
                `;
                studentListDiv.appendChild(studentItem);
            });
        }
        
        function viewStudent(id) {
            document.getElementById('studentId').value = id;
            searchStudent();
            document.getElementById('search-student').scrollIntoView({ behavior: 'smooth' });
        }

        function uploadTask(event) {
            event.preventDefault();
            showToast('نیا ٹاسک کامیابی سے اپ لوڈ کر دیا گیا ہے۔', 'success');
            event.target.reset();
        }
        
        // Initial render of student list on page load
        document.addEventListener('DOMContentLoaded', renderStudentList);

        // Simple toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
    </script>

</body>
</html>
