<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لاگ ان - پاک ایجوکیٹ</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #d35400;
            --primary-hover: #e67e22;
            --secondary-color: #2c3e50;
            --text-light: #ffffff;
            --background-light: #fdfefe;
            --font-urdu: 'Noto Nastaliq Urdu', serif;
            --font-eng: 'Poppins', sans-serif;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            font-family: var(--font-eng);
            margin: 0;
            background-color: var(--background-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            height: 550px;
            background-color: var(--text-light);
            box-shadow: var(--shadow);
            border-radius: 15px;
            overflow: hidden;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .form-panel {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .branding-panel {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 50px;
        }
        .branding-panel h1 {
            font-family: var(--font-urdu);
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .branding-panel p {
            font-size: 1.2rem;
            font-family: var(--font-urdu);
        }

        .form-panel h2 {
            font-family: var(--font-urdu);
            font-size: 2.5rem;
            color: var(--secondary-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: var(--font-eng);
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.2rem;
            font-family: var(--font-urdu);
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover { background-color: var(--primary-hover); }

        .error {
            color: #c0392b;
            text-align: center;
            margin-top: 15px;
            font-family: var(--font-urdu);
        }

        .extra-links {
            text-align: center;
            margin-top: 25px;
            font-family: var(--font-urdu);
        }
        .extra-links a {
            color: var(--primary-color);
            text-decoration: none;
            transition: text-decoration 0.3s;
        }
        .extra-links a:hover { text-decoration: underline; }

    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="form-panel">
            <h2>لاگ ان کریں</h2>
            <form method="POST">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="یوزر نیم" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="پاس ورڈ" required>
                </div>
                <button type="submit">لاگ ان</button>
                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}
            </form>
            
            {% if show_register_link %}
            <div class="extra-links">
                <p>اکاؤنٹ نہیں ہے؟ <a href="/register">یہاں رجسٹر ہوں</a></p>
            </div>
            {% endif %}
        </div>
        <div class="branding-panel">
            <h1>پاک ایجوکیٹ</h1>
            <p>علم کی دنیا میں ایک قدم آگے بڑھائیں۔</p>
        </div>
    </div>
</body>
</html>
