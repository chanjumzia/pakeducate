<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لاگ ان - پاک ایجوکیٹ</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="login-wrapper">
        <div class="form-panel">
            <h2>لاگ ان کریں</h2>
            <form method="POST">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="یوزر نیم" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="پاس ورڈ" required>
                </div>
                <button type="submit">لاگ ان</button>
                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}
            </form>
            
            {% if show_register_link %}
            <div class="extra-links">
                <p>اکاؤنٹ نہیں ہے؟ <a href="/register">یہاں رجسٹر ہوں</a></p>
            </div>
            {% endif %}
        </div>
        <div class="branding-panel">
            <h1>پاک ایجوکیٹ</h1>
            <p>علم کی دنیا میں ایک قدم آگے بڑھائیں۔</p>
        </div>
    </div>
</body>
</html>
