
<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایڈمن ڈیش بورڈ - پاک ایجوکیٹ</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Pak<span>Educate</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-tachometer-alt"></i>ڈیش بورڈ</a>
            <a href="{{ url_for('register') }}"><i class="fas fa-user-plus"></i>صارف شامل کریں</a>
            <a href="#"><i class="fas fa-users-cog"></i>صارفین کا انتظام</a>
            <a href="{{ url_for('admin_settings') }}"><i class="fas fa-cogs"></i>سیٹنگز</a>
        </nav>
        <div class="logout-btn">
            <a href="{{ url_for('logout') }}" class="sidebar-nav-item"><i class="fas fa-sign-out-alt"></i>لاگ آؤٹ</a>
        </div>
    </div>

    <div class="main-content">
        <header class="header">
            <h1>ایڈمن ڈیش بورڈ</h1>
        </header>

        <div class="welcome-section">
            <h2>خوش آمدید، {{ username }}!</h2>
            <p id="greeting">یہاں سے آپ سسٹم کے تمام پہلوؤں کا انتظام کر سکتے ہیں۔</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card-icon" style="background-color: #3498db;"><i class="fas fa-users"></i></div>
                <div class="stat-card-info">
                    <h3>کل صارفین</h3>
                    <p>150</p>
                </div>
            </div>
            <div class="stat-card">
                 <div class="stat-card-icon" style="background-color: #2ecc71;"><i class="fas fa-chalkboard-teacher"></i></div>
                <div class="stat-card-info">
                    <h3>کل اساتذہ</h3>
                    <p>25</p>
                </div>
            </div>
            <div class="stat-card">
                 <div class="stat-card-icon" style="background-color: #e67e22;"><i class="fas fa-graduation-cap"></i></div>
                <div class="stat-card-info">
                    <h3>کل طلباء</h3>
                    <p>1200</p>
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <h2>فوری کاروائیاں</h2>
             <div class="action-grid">
                <a href="{{ url_for('register') }}" class="action-card">
                    <i class="fas fa-user-plus"></i>
                    <span>نیا صارف بنائیں</span>
                </a>
                <a href="#" class="action-card">
                    <i class="fas fa-bullhorn"></i>
                    <span>اعلانات بھیجیں</span>
                </a>
                <a href="#" class="action-card">
                    <i class="fas fa-chart-line"></i>
                    <span>رپورٹس دیکھیں</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateGreeting() {
            const greetingEl = document.getElementById('greeting');
            if (!greetingEl) return;
            const currentHour = new Date().getHours();
            let greetingText = '';
            if (currentHour < 12) {
                greetingText = 'صبح بخیر! آج کا دن کیسا گزر رہا ہے؟';
            } else if (currentHour < 18) {
                greetingText = 'سہ پہر بخیر! امید ہے آپ کا دن اچھا گزر رہا ہو۔';
            } else {
                greetingText = 'شام بخیر! اپنا کام مکمل کرنے کا بہترین وقت۔';
            }
            greetingEl.textContent = greetingText;
        }
        updateGreeting();
    </script>

</body>
</html>
