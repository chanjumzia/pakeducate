<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایڈمن ڈیش بورڈ - پاک ایجوکیٹ</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #3498db; /* A professional blue */
            --secondary-color: #2c3e50;
            --sidebar-bg: #2c3e50; /* Dark sidebar */
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --text-light: #ecf0f1;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --font-urdu: 'Noto Nastaliq Urdu', serif;
            --font-eng: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--background-color);
            font-family: var(--font-eng);
            margin: 0;
            display: flex;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Sidebar */
        .sidebar {
            width: 300px; /* INCREASED width */
            background-color: var(--sidebar-bg);
            color: var(--text-light);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            box-sizing: border-box;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .sidebar-header h2 {
            font-family: var(--font-eng);
            font-weight: 700;
            font-size: 2rem;
            color: var(--text-light);
        }
        .sidebar-header span { color: var(--primary-color); }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 15px 25px; /* INCREASED padding */
            color: var(--text-light);
            text-decoration: none;
            font-family: var(--font-urdu);
            font-size: 1.1rem;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: background-color 0.3s, color 0.3s;
        }
        .sidebar-nav a i {
            margin-left: 15px;
            width: 20px;
            text-align: center;
        }
        .sidebar-nav a.active, .sidebar-nav a:hover {
            background-color: var(--primary-color);
            color: var(--text-light);
        }

        .logout-btn {
            margin-top: auto;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-right: 300px; /* Match sidebar width */
            padding: 50px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-family: var(--font-urdu);
            font-size: 2.2rem;
            color: var(--secondary-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
        }
        .stat-card-icon {
            font-size: 3rem;
            margin-left: 20px;
            padding: 15px;
            border-radius: 50%;
            color: var(--text-light);
        }
        .stat-card-info h3 {
            margin: 0;
            font-family: var(--font-urdu);
            font-size: 1.2rem;
        }
        .stat-card-info p {
            margin: 5px 0 0;
            font-size: 2rem;
            font-weight: 600;
        }

        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--text-light);
            padding: 40px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .welcome-section h2, .welcome-section p {
            font-family: var(--font-urdu);
            text-align: right;
        }
        .welcome-section h2 { font-size: 2rem; }
        .welcome-section p { font-size: 1.2rem; }

        /* Quick Actions */
        .quick-actions h2 {
            font-family: var(--font-urdu);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .action-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-urdu);
            font-size: 1.3rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .action-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            color: var(--primary-color);
        }
        .action-card i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            color: var(--primary-color);
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Pak<span>Educate</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-tachometer-alt"></i>ڈیش بورڈ</a>
            <a href="{{ url_for('register') }}"><i class="fas fa-user-plus"></i>صارف شامل کریں</a>
            <a href="#"><i class="fas fa-users-cog"></i>صارفین کا انتظام</a>
            <a href="#"><i class="fas fa-cogs"></i>سیٹنگز</a>
        </nav>
        <div class="logout-btn">
            <a href="{{ url_for('logout') }}" class="sidebar-nav-item"><i class="fas fa-sign-out-alt"></i>لاگ آؤٹ</a>
        </div>
    </div>

    <div class="main-content">
        <header class="header">
            <h1>ایڈمن ڈیش بورڈ</h1>
        </header>

        <div class="welcome-section">
            <h2>خوش آمدید، {{ username }}!</h2>
            <p id="greeting">یہاں سے آپ سسٹم کے تمام پہلوؤں کا انتظام کر سکتے ہیں۔</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card-icon" style="background-color: #3498db;"><i class="fas fa-users"></i></div>
                <div class="stat-card-info">
                    <h3>کل صارفین</h3>
                    <p>150</p>
                </div>
            </div>
            <div class="stat-card">
                 <div class="stat-card-icon" style="background-color: #2ecc71;"><i class="fas fa-chalkboard-teacher"></i></div>
                <div class="stat-card-info">
                    <h3>کل اساتذہ</h3>
                    <p>25</p>
                </div>
            </div>
            <div class="stat-card">
                 <div class="stat-card-icon" style="background-color: #e67e22;"><i class="fas fa-graduation-cap"></i></div>
                <div class="stat-card-info">
                    <h3>کل طلباء</h3>
                    <p>1200</p>
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <h2>فوری کاروائیاں</h2>
             <div class="action-grid">
                <a href="{{ url_for('register') }}" class="action-card">
                    <i class="fas fa-user-plus"></i>
                    <span>نیا صارف بنائیں</span>
                </a>
                <a href="#" class="action-card">
                    <i class="fas fa-bullhorn"></i>
                    <span>اعلانات بھیجیں</span>
                </a>
                <a href="#" class="action-card">
                    <i class="fas fa-chart-line"></i>
                    <span>رپورٹس دیکھیں</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateGreeting() {
            const greetingEl = document.getElementById('greeting');
            if (!greetingEl) return;
            const currentHour = new Date().getHours();
            let greetingText = '';
            if (currentHour < 12) {
                greetingText = 'صبح بخیر! آج کا دن کیسا گزر رہا ہے؟';
            } else if (currentHour < 18) {
                greetingText = 'سہ پہر بخیر! امید ہے آپ کا دن اچھا گزر رہا ہو۔';
            } else {
                greetingText = 'شام بخیر! اپنا کام مکمل کرنے کا بہترین وقت۔';
            }
            greetingEl.textContent = greetingText;
        }
        updateGreeting();
    </script>

</body>
</html>
