<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ٹیچر ڈیش بورڈ - پاک ایجوکیٹ</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #27ae60; /* A fresh, educational green */
            --secondary-color: #2c3e50;
            --sidebar-bg: #2c3e50;
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --text-light: #ecf0f1;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --font-urdu: 'Noto Nastaliq Urdu', serif;
            --font-eng: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--background-color);
            font-family: var(--font-eng);
            margin: 0;
            display: flex;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Sidebar */
        .sidebar {
            width: 280px; /* Increased width for better spacing */
            background-color: var(--sidebar-bg);
            color: var(--text-light);
            padding: 25px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2); /* Added shadow for depth */
        }

        .sidebar-header h2 {
            font-family: var(--font-eng);
            font-weight: 700;
            font-size: 2.2rem; /* Slightly larger */
            color: var(--text-light);
            text-align: center;
            margin-bottom: 40px; /* More space at the top */
        }
        .sidebar-header span { color: var(--primary-color); }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 15px 20px; /* Increased padding */
            color: var(--text-light);
            text-decoration: none;
            font-family: var(--font-urdu);
            font-size: 1.2rem; /* Larger font size */
            border-radius: 8px;
            margin-bottom: 12px;
            transition: background-color 0.3s, transform 0.2s;
        }
        .sidebar-nav a i { 
            margin-left: 18px; /* More space for icon */
            width: 22px; 
            text-align: center; 
            font-size: 1.3rem; /* Larger icons */
        }
        .sidebar-nav a.active, .sidebar-nav a:hover {
            background-color: var(--primary-color);
            color: #fff;
            transform: translateX(-5px); /* Slight move effect on hover/active */
        }

        .logout-btn { 
            margin-top: auto; 
            border-top: 1px solid #3e5266; /* Separator line */
            padding-top: 15px;
        }
        .logout-btn a {
             display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-light);
            text-decoration: none;
            font-family: var(--font-urdu);
            font-size: 1.2rem;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.2s;
        }
        .logout-btn a:hover {
            background-color: #c0392b;
            transform: translateX(-5px);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-right: 280px; /* Match sidebar width */
            padding: 40px; /* Increased padding */
        }

        .header h1 {
            font-family: var(--font-urdu);
            font-size: 2.8rem; /* Larger title */
            color: var(--secondary-color);
            margin-bottom: 25px;
            border-bottom: 4px solid var(--primary-color);
            padding-bottom: 15px;
        }
        
        .welcome-section {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--text-light);
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: var(--shadow);
        }
        .welcome-section h2 {
            font-family: var(--font-urdu);
            font-size: 2.5rem;
            margin: 0;
        }

        .tool-section {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }
        .tool-section h3 {
            font-family: var(--font-urdu);
            font-size: 2rem;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .tool-section h3 i {
            margin-left: 15px;
            color: var(--primary-color);
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-family: var(--font-urdu);
            font-size: 1.1rem;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: var(--font-eng);
            direction: ltr;
            text-align: right;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(39, 174, 96, 0.2);
            outline: none;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-urdu);
            font-size: 1.2rem;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }
        .btn:hover { 
            background-color: #2ecc71; 
            transform: translateY(-2px);
        }
        
        #student-list {
            margin-top: 20px;
        }
        
        .student-data, .student-list-item {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 8px;
            animation: fadeIn 0.5s;
            margin-top: 20px;
        }
        
        .student-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .student-list-item:hover {
            background-color: #e9ecef;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>Pak<span>Educate</span></h2></div>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-tachometer-alt"></i>ڈیش بورڈ</a>
            <a href="#search-student"><i class="fas fa-search"></i>طالب علم تلاش کریں</a>
            <a href="#add-student"><i class="fas fa-user-plus"></i>طالب علم شامل کریں</a>
            <a href="#student-list-section"><i class="fas fa-users"></i>طلباء کی فہرست</a>
            <a href="#upload-task"><i class="fas fa-tasks"></i>ٹاسک اپلوڈ کریں</a>
        </nav>
        <div class="logout-btn"><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i>لاگ آؤٹ</a></div>
    </div>

    <div class="main-content">
        <header class="header"><h1>ٹیچر ڈیش بورڈ</h1></header>

        <div class="welcome-section"><h2>خوش آمدید، {{ username }}!</h2></div>

        <div id="search-student" class="tool-section">
            <h3><i class="fas fa-search"></i> طالب علم تلاش کریں</h3>
            <div class="form-group">
                <label for="studentId">طالب علم ID</label>
                <input type="text" id="studentId" placeholder="ID درج کریں">
            </div>
            <button class="btn" onclick="searchStudent()">تلاش کریں</button>
            <div id="studentData" style="display: none;"></div>
        </div>

        <div id="add-student" class="tool-section">
            <h3><i class="fas fa-user-plus"></i> نیا طالب علم شامل کریں</h3>
            <form onsubmit="addStudent(event)">
                <div class="form-group">
                    <label for="newName">پورا نام</label>
                    <input type="text" id="newName" required>
                </div>
                <div class="form-group">
                    <label for="newFatherName">والد کا نام</label>
                    <input type="text" id="newFatherName" required>
                </div>
                 <div class="form-group">
                    <label for="newClass">کلاس</label>
                    <input type="text" id="newClass" required>
                </div>
                <button type="submit" class="btn">طالب علم شامل کریں</button>
            </form>
        </div>
        
        <div id="student-list-section" class="tool-section">
            <h3><i class="fas fa-users"></i> کل طلباء کی فہرست</h3>
            <div id="student-list">
                <!-- Students will be dynamically added here -->
            </div>
        </div>

        <div id="upload-task" class="tool-section">
            <h3><i class="fas fa-tasks"></i> نیا ٹاسک اپ لوڈ کریں</h3>
            <form onsubmit="uploadTask(event)">
                <div class="form-group">
                    <label for="taskTitle">ٹاسک کا عنوان</label>
                    <input type="text" id="taskTitle" required>
                </div>
                 <div class="form-group">
                    <label for="taskDescription">تفصیل</label>
                    <textarea id="taskDescription" rows="4"></textarea>
                </div>
                <button type="submit" class="btn">اپ لوڈ کریں</button>
            </form>
        </div>
    </div>

    <script>
        // Mock data for students
        let students = [
            { id: '101', name: 'محمد علی', fatherName: 'احمد علی', className: 'دہم' },
            { id: '102', name: 'فاطمہ خان', fatherName: 'عمران خان', className: 'نہم' },
            { id: '103', name: 'بلال احمد', fatherName: 'طارق احمد', className: 'دہم' }
        ];

        function searchStudent() {
            const studentId = document.getElementById('studentId').value;
            const studentDataDiv = document.getElementById('studentData');

            if (!studentId) {
                showToast('براہ کرم طالب علم ID درج کریں۔', 'error');
                return;
            }
            
            const student = students.find(s => s.id === studentId);
            
            if (student) {
                studentDataDiv.innerHTML = `
                    <div class="student-data">
                        <p><strong>ID:</strong> ${student.id}</p>
                        <p><strong>نام:</strong> ${student.name}</p>
                        <p><strong>والد کا نام:</strong> ${student.fatherName}</p>
                        <p><strong>کلاس:</strong> ${student.className}</p>
                    </div>`;
                studentDataDiv.style.display = 'block';
            } else {
                studentDataDiv.innerHTML = '<div class="student-data"><p>اس ID کے ساتھ کوئی طالب علم نہیں ملا۔</p></div>';
                studentDataDiv.style.display = 'block';
                showToast('طالب علم نہیں ملا!', 'error');
            }
        }

        function addStudent(event) {
            event.preventDefault();
            const newName = document.getElementById('newName').value;
            const newFatherName = document.getElementById('newFatherName').value;
            const newClass = document.getElementById('newClass').value;
            
            const newId = 'ST' + (students.length + 101);
            
            students.push({ id: newId, name: newName, fatherName: newFatherName, className: newClass });
            
            showToast('نیا طالب علم کامیابی سے شامل کر دیا گیا ہے۔', 'success');
            renderStudentList();
            event.target.reset();
        }
        
        function renderStudentList() {
            const studentListDiv = document.getElementById('student-list');
            studentListDiv.innerHTML = ''; // Clear existing list
            
            students.forEach(student => {
                const studentItem = document.createElement('div');
                studentItem.className = 'student-list-item';
                studentItem.innerHTML = `
                    <div>
                        <strong>${student.name}</strong> (ID: ${student.id}) - کلاس: ${student.className}
                    </div>
                    <button class="btn-small" onclick="viewStudent('${student.id}')">تفصیلات دیکھیں</button>
                `;
                studentListDiv.appendChild(studentItem);
            });
        }
        
        function viewStudent(id) {
            document.getElementById('studentId').value = id;
            searchStudent();
            document.getElementById('search-student').scrollIntoView({ behavior: 'smooth' });
        }

        function uploadTask(event) {
            event.preventDefault();
            showToast('نیا ٹاسک کامیابی سے اپ لوڈ کر دیا گیا ہے۔', 'success');
            event.target.reset();
        }
        
        // Initial render of student list on page load
        document.addEventListener('DOMContentLoaded', renderStudentList);

        // Simple toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
    </script>

</body>
</html>
