<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ٹیچر ڈیش بورڈ - پاک ایجوکیٹ</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #27ae60; /* A fresh, educational green */
            --secondary-color: #2c3e50;
            --sidebar-bg: #2c3e50;
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --text-light: #ecf0f1;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --font-urdu: 'Noto Nastaliq Urdu', serif;
            --font-eng: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--background-color);
            font-family: var(--font-eng);
            margin: 0;
            display: flex;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--text-light);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
        }

        .sidebar-header h2 {
            font-family: var(--font-eng);
            font-weight: 700;
            font-size: 2rem;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 30px;
        }
        .sidebar-header span { color: var(--primary-color); }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-light);
            text-decoration: none;
            font-family: var(--font-urdu);
            font-size: 1.1rem;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: background-color 0.3s, color 0.3s;
        }
        .sidebar-nav a i { margin-left: 15px; width: 20px; text-align: center; }
        .sidebar-nav a.active, .sidebar-nav a:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        .logout-btn { margin-top: auto; }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-right: 260px;
            padding: 30px;
        }

        .header h1 {
            font-family: var(--font-urdu);
            font-size: 2.2rem;
            color: var(--secondary-color);
            margin-bottom: 30px;
        }
        
        .welcome-section {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--text-light);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .welcome-section h2 {
            font-family: var(--font-urdu);
            font-size: 2rem;
        }

        .tool-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .tool-section h3 {
            font-family: var(--font-urdu);
            font-size: 1.7rem;
            color: var(--secondary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-family: var(--font-urdu);
            font-size: 1rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: var(--font-eng);
            direction: ltr;
            text-align: right;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: var(--font-urdu);
            font-size: 1.1rem;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #2ecc71; }

        .student-data {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 5px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>Pak<span>Educate</span></h2></div>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-tachometer-alt"></i>ڈیش بورڈ</a>
            <a href="#"><i class="fas fa-search"></i>طالب علم تلاش کریں</a>
            <a href="#"><i class="fas fa-user-plus"></i>طالب علم شامل کریں</a>
            <a href="#"><i class="fas fa-tasks"></i>ٹاسک اپلوڈ کریں</a>
        </nav>
        <div class="logout-btn"><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i>لاگ آؤٹ</a></div>
    </div>

    <div class="main-content">
        <header class="header"><h1>ٹیچر ڈیش بورڈ</h1></header>

        <div class="welcome-section"><h2>خوش آمدید، {{ username }}!</h2></div>

        <div id="search-student" class="tool-section">
            <h3><i class="fas fa-search"></i> طالب علم تلاش کریں</h3>
            <div class="form-group">
                <label for="studentId">طالب علم ID</label>
                <input type="text" id="studentId" placeholder="ID درج کریں">
            </div>
            <button class="btn" onclick="searchStudent()">تلاش کریں</button>
            <div class="student-data" id="studentData" style="display: none; margin-top: 20px;"></div>
        </div>

        <div id="add-student" class="tool-section">
            <h3><i class="fas fa-user-plus"></i> نیا طالب علم شامل کریں</h3>
            <form onsubmit="addStudent(event)">
                <div class="form-group">
                    <label for="newName">نام</label>
                    <input type="text" id="newName" required>
                </div>
                <!-- Add more fields as needed -->
                <button type="submit" class="btn">شامل کریں</button>
            </form>
        </div>

        <div id="upload-task" class="tool-section">
            <h3><i class="fas fa-tasks"></i> نیا ٹاسک اپ لوڈ کریں</h3>
            <form onsubmit="uploadTask(event)">
                <div class="form-group">
                    <label for="taskTitle">ٹاسک کا عنوان</label>
                    <input type="text" id="taskTitle" required>
                </div>
                 <div class="form-group">
                    <label for="taskDescription">تفصیل</label>
                    <textarea id="taskDescription" rows="4"></textarea>
                </div>
                <button type="submit" class="btn">اپ لوڈ کریں</button>
            </form>
        </div>
    </div>

    <script>
        function searchStudent() {
            const studentId = document.getElementById('studentId').value;
            if (!studentId) { alert('براہ کرم طالب علم ID درج کریں'); return; }
            
            const student = { name: 'محمد علی', fatherName: 'احمد علی', class: 'دہم', fee: { status: 'Unpaid', amount: '500 PKR' } };
            const studentDataDiv = document.getElementById('studentData');
            studentDataDiv.innerHTML = `<p><strong>نام:</strong> ${student.name}</p><p><strong>والد کا نام:</strong> ${student.fatherName}</p><p><strong>کلاس:</strong> ${student.class}</p><p><strong>فیس:</strong> ${student.fee.status} (${student.fee.amount})</p>`;
            studentDataDiv.style.display = 'block';
        }

        function addStudent(event) {
            event.preventDefault();
            alert('نیا طالب علم شامل کر دیا گیا ہے۔');
            event.target.reset();
        }

        function uploadTask(event) {
            event.preventDefault();
            alert('نیا ٹاسک اپ لوڈ کر دیا گیا ہے۔');
            event.target.reset();
        }
    </script>

</body>
</html>
