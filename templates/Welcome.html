<!DOCTYPE html>
<html lang="ur">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خوش آمدید</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap');

        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            direction: rtl;
            background: #232526;
            /* fallback for old browsers */
            background: -webkit-linear-gradient(to right, #414345, #232526);
            /* Chrome 10-25, Safari 5.1-6 */
            background: linear-gradient(to right, #414345, #232526);
            /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Use min-height to handle content overflow */
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .welcome-container {
            text-align: center;
        }

        .welcome-text {
            font-size: 4rem;
            color: #fff;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards, slideUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.5s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(60px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .english-part {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            color: #00d9ff;
            text-shadow: 0 0 10px #00d9ff, 0 0 20px #00d9ff;
            display: inline-block;
            margin: 0 10px;
        }

        /* Courses Section */
        .courses-section {
            margin-top: 50px;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out 1.5s forwards;
        }

        .courses-section h2 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 25px;
        }

        .courses-section ul {
            list-style: none;
            padding: 0;
        }

        .courses-section li {
            font-size: 1.8rem;
            color: #eee;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease-out forwards;
        }

        /* Staggered animation for courses */
        .courses-section li:nth-child(1) {
            animation-delay: 2s;
        }

        .courses-section li:nth-child(2) {
            animation-delay: 2.3s;
        }

        .courses-section li:nth-child(3) {
            animation-delay: 2.6s;
        }


        /* A link to continue to the dashboard */
        .continue-link {
            display: inline-block;
            /* Changed for better alignment */
            margin-top: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid #fff;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out 3.5s forwards;
            /* Delayed further */
            transition: background-color 0.3s, color 0.3s;
        }

        .continue-link:hover {
            background-color: #fff;
            color: #232526;
        }
    </style>
</head>

<body>
    <div class="welcome-container">
        <h1 class="welcome-text">
            <span class="english-part">Urdu AI</span>
            ماسٹر کلاس میں خوش آمدید
        </h1>

        <div class="courses-section">
            <h2>ہمارے کورسز</h2>
            <ul>
                <li>ویب ڈویلپمنٹ</li>
                <li>گرافک ڈیزائننگ</li>
                <li>ڈیجیٹل مارکیٹنگ</li>
            </ul>
        </div>

        <a href="/index" class="continue-link">ڈیش بورڈ پر جائیں</a>
    </div>
</body>

</html>
